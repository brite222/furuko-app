<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FUKURO — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060608; --surface: #0e0e14; --card: #13131c; --card2: #181824;
      --border: rgba(255,255,255,0.07); --accent: #c8f542; --accent2: #42f5c8;
      --accent3: #f542a4; --text: #f0f0f8; --muted: #5a5a72; --muted2: #8888aa;
      --font-display: 'Bebas Neue', sans-serif; --font-body: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
    .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(200,245,66,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(200,245,66,0.03) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
    .bg-glow { position: fixed; top: -300px; left: 50%; transform: translateX(-50%); width: 900px; height: 600px; background: radial-gradient(ellipse, rgba(200,245,66,0.06) 0%, transparent 65%); pointer-events: none; z-index: 0; }

    .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar.open { transform: translateX(0); box-shadow: 8px 0 32px rgba(0,0,0,0.6); }
    .sidebar {
      position: fixed !important;
      top: 0; left: 0;
      width: 240px;
      height: 100%; height: 100dvh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex !important;
      flex-direction: column;
      padding: 32px 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      z-index: 200 !important;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .logo { padding: 0 24px 32px; border-bottom: 1px solid var(--border); }
    .logo-text { font-family: var(--font-display); font-size: 36px; letter-spacing: 4px; color: var(--accent); line-height: 1; }
    .logo-sub { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
    .nav { padding: 24px 16px; flex: 1; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
    .nav-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 0 8px; margin: 12px 0 6px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--muted2); font-size: 14px; font-weight: 500; transition: all 0.2s; text-decoration: none; border: 1px solid transparent; }
    .nav-item:hover { color: var(--text); background: var(--card); }
    .nav-item.active { color: var(--accent); background: rgba(200,245,66,0.08); border-color: rgba(200,245,66,0.15); }
    .nav-item .icon { width: 18px; text-align: center; font-size: 16px; }
    .nav-item .badge { margin-left: auto; background: var(--accent3); color: #000; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; font-family: var(--font-mono); }
    .sidebar-bottom { padding: 16px; border-top: 1px solid var(--border); }
    .user-chip { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--card); border-radius: 10px; border: 1px solid var(--border); }
    .avatar { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #000; flex-shrink: 0; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-email { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .logout-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; transition: color 0.2s; }
    .logout-btn:hover { color: #fa6d6d; }

    /* MOBILE TOPBAR */
    .topbar { display: none; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 60px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 150; }
    .topbar-title { font-family: var(--font-display); font-size: 24px; letter-spacing: 2px; }

    /* HAMBURGER */
    .hamburger { display: none; flex-direction: column; justify-content: center; align-items: center; gap: 5px; width: 44px; height: 44px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: border-color 0.2s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .hamburger:hover { border-color: rgba(200,245,66,0.3); }
    .hamburger span { display: block; width: 18px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s ease; pointer-events: none; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* OVERLAY */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
    .sidebar-overlay.show { opacity: 1; pointer-events: auto; }

    /* CONTENT */
    .content { padding: 32px; overflow-y: auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-family: var(--font-display); font-size: 40px; letter-spacing: 3px; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted2); font-family: var(--font-mono); background: var(--card); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }

    /* PODIUM */
    .podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; margin-bottom: 40px; }
    .podium-wrap { width: 120px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .podium-avatar { border-radius: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; font-family: var(--font-display); letter-spacing: 1px; }
    .podium-name { font-size: 13px; font-weight: 600; color: var(--text); text-align: center; word-break: break-all; }
    .podium-pts { font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
    .podium-base { border-radius: 12px 12px 0 0; width: 100%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 28px; }

    /* LEADERBOARD LIST */
    .lb-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .lb-card-header { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); gap: 12px; }
    .lb-col { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .lb-col.rank { width: 48px; }
    .lb-col.name { flex: 1; }
    .lb-col.pts { width: 100px; text-align: right; }
    .lb-row { display: flex; align-items: center; padding: 14px 20px; gap: 12px; border-bottom: 1px solid var(--border); transition: background 0.2s; }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: var(--card2); }
    .lb-row.you { background: rgba(200,245,66,0.05); border-left: 3px solid var(--accent); }
    .lb-row.top1 { background: rgba(255,215,0,0.05); }
    .lb-row.top2 { background: rgba(192,192,192,0.05); }
    .lb-row.top3 { background: rgba(205,127,50,0.05); }
    .rank-num { width: 48px; font-family: var(--font-display); font-size: 22px; color: var(--muted); text-align: center; flex-shrink: 0; }
    .lb-row.top1 .rank-num { color: #ffd700; }
    .lb-row.top2 .rank-num { color: #c0c0c0; }
    .lb-row.top3 .rank-num { color: #cd7f32; }
    .lb-avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #000; flex-shrink: 0; }
    .lb-name { flex: 1; min-width: 0; }
    .lb-username { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .you-tag { font-family: var(--font-mono); font-size: 10px; color: var(--accent); background: rgba(200,245,66,0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(200,245,66,0.2); flex-shrink: 0; }
    .lb-pts-val { width: 100px; text-align: right; font-family: var(--font-mono); font-size: 14px; font-weight: 500; color: var(--text); flex-shrink: 0; }

    .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.5s, visibility 0.5s; }
    .loading-overlay.hidden { opacity: 0; visibility: hidden; }
    .loading-logo { font-family: var(--font-display); font-size: 64px; letter-spacing: 8px; color: var(--accent); animation: flicker 1.5s ease infinite; }
    @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .loading-bar-wrap { width: 200px; height: 2px; background: var(--border); border-radius: 2px; margin-top: 24px; overflow: hidden; }
    .loading-bar { height: 100%; background: var(--accent); border-radius: 2px; animation: loadBar 1.5s ease forwards; }
    @keyframes loadBar { from { width: 0; } to { width: 100%; } }
    .empty { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }
      .sidebar-overlay { display: block; }
      .hamburger { display: flex; }
      .topbar { display: flex; }
      .content { padding: 16px; padding-top: 24px; }
      .page-header { margin-bottom: 20px; }
      .page-title { font-size: 28px; }
      .podium { gap: 8px; margin-bottom: 24px; }
      .podium-wrap { width: 100px; }
      .podium-name { font-size: 11px; }
      .podium-pts { font-size: 10px; }
      .lb-card-header { display: none; }
      .lb-row { padding: 12px 14px; gap: 10px; }
      .rank-num { width: 32px; font-size: 18px; }
      .lb-avatar { width: 30px; height: 30px; font-size: 12px; border-radius: 8px; }
      .lb-username { font-size: 13px; }
      .lb-pts-val { width: auto; font-size: 13px; }
    }

    @media (max-width: 480px) {
      .page-title { font-size: 22px; }
      .podium { gap: 6px; }
      .podium-wrap { width: 80px; }
      .podium-name { font-size: 10px; }
      .lb-row { padding: 10px 12px; gap: 8px; }
      .rank-num { width: 24px; font-size: 16px; }
      .lb-username { font-size: 12px; }
      .lb-pts-val { font-size: 12px; }
    }
  
    @media (min-width: 769px) {
      .sidebar { transform: translateX(0) !important; box-shadow: none !important; }
      .app { margin-left: 240px; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div class="loading-logo">FUKURO</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-text">FUKURO</div>
      <div class="logo-sub">Ecosystem Dashboard</div>
    </div>
    <nav class="nav">
      <div class="nav-label">Main</div>
      <a class="nav-item" href="dashboard.html"><span class="icon">⚡</span> Dashboard</a>
      <a class="nav-item active" href="leaderboard.html"><span class="icon">🏆</span> Leaderboard <span class="badge">LIVE</span></a>
      <a class="nav-item" href="dashboard.html#wallet"><span class="icon">💼</span> Wallet</a>
      <div class="nav-label">Activity</div>
      <a class="nav-item" href="tasks.html"><span class="icon">✅</span> Tasks</a>
      <a class="nav-item" href="points-history.html"><span class="icon">📈</span> Points History</a>
      <div class="nav-label">Account</div>
      <a class="nav-item" href="profile.html"><span class="icon">👤</span> Profile</a>
      <a class="nav-item" href="settings.html"><span class="icon">⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-chip">
        <div class="avatar" id="sidebarAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebarName">Loading...</div>
          <div class="user-email" id="sidebarEmail">—</div>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Logout">⏻</button>
      </div>
    </div>
  </aside>

<div class="app">

  <!-- MOBILE TOPBAR -->
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title">LEADERBOARD</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted2);font-family:var(--font-mono);">
      <div class="dot"></div> LIVE
    </div>
  </header>

  <div class="content">
    <div class="page-header">
      <div class="page-title">LEADERBOARD</div>
      <div class="live-badge"><div class="dot"></div> LIVE</div>
    </div>

    <div class="podium" id="podium"></div>

    <div class="lb-card">
      <div class="lb-card-header">
        <div class="lb-col rank">Rank</div>
        <div style="width:36px"></div>
        <div class="lb-col name">Player</div>
        <div class="lb-col pts">Points</div>
      </div>
      <div id="lbFull"></div>
    </div>
  </div>
</div>

<script>
  // ── Sidebar (mobile-safe) ────────────────────────────────────
  (function() {
    var sidebar   = document.getElementById('sidebar');
    var overlay   = document.getElementById('sidebarOverlay') || document.getElementById('backdrop');
    var hamburger = document.getElementById('hamburger');

    function open()  {
      sidebar.classList.add('open');
      if (overlay)   overlay.classList.add('show');
      if (hamburger) hamburger.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function close() {
      sidebar.classList.remove('open');
      if (overlay)   overlay.classList.remove('show');
      if (hamburger) hamburger.classList.remove('open');
      document.body.style.overflow = '';
    }
    window.toggleSidebar = function() { sidebar.classList.contains('open') ? close() : open(); };
    window.closeSidebar  = close;

    if (hamburger) {
      hamburger.addEventListener('click', function(e) {
        e.stopPropagation();
        window.toggleSidebar();
      });
    }
    if (overlay) overlay.addEventListener('click', close);

    document.querySelectorAll('.nav-item').forEach(function(a) {
      a.addEventListener('click', function() { if (window.innerWidth <= 768) close(); });
    });

    var tx = 0, ty = 0;
    sidebar.addEventListener('touchstart', function(e) {
      tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    }, { passive: true });
    sidebar.addEventListener('touchend', function(e) {
      var dx = tx - e.changedTouches[0].clientX;
      var dy = Math.abs(ty - e.changedTouches[0].clientY);
      if (dx > 60 && dx > dy) close();
    }, { passive: true });
  })();

  const API = "https://zestful-wisdom-production-c5b7.up.railway.app/api";
  const token = localStorage.getItem("token");

  // ── Sidebar ──────────────────────────────────────────────────
  (function() {
    var sidebar   = document.getElementById('sidebar');
    var overlay   = document.getElementById('sidebarOverlay');
    var hamburger = document.getElementById('hamburger');
    var logoutBtn = document.getElementById('logoutBtn');

    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('show');
      hamburger.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    window.closeSidebar  = closeSidebar;
    window.toggleSidebar = function() { sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); };

    hamburger.addEventListener('click', function(e) { e.stopPropagation(); window.toggleSidebar(); });
    overlay.addEventListener('click', closeSidebar);
    if (logoutBtn) logoutBtn.addEventListener('click', logout);

    document.querySelectorAll('.nav-item').forEach(function(a) {
      a.addEventListener('click', function() { if (window.innerWidth <= 768) closeSidebar(); });
    });

    var tx = 0, ty = 0;
    sidebar.addEventListener('touchstart', function(e) { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
    sidebar.addEventListener('touchend', function(e) {
      var dx = tx - e.changedTouches[0].clientX, dy = Math.abs(ty - e.changedTouches[0].clientY);
      if (dx > 60 && dx > dy) closeSidebar();
    }, { passive: true });
  })();

  window.onload = async () => {
    setTimeout(() => document.getElementById("loader").classList.add("hidden"), 1500);
    if (!token) { window.location.href = "login.html"; return; }
    try {
      const pRes = await fetch(`${API}/protected/profile`, { headers: { "Authorization": "Bearer " + token } });
      if (!pRes.ok) { logout(); return; }
      const { user } = await pRes.json();
      document.getElementById("sidebarAvatar").textContent = user.username[0].toUpperCase();
      document.getElementById("sidebarName").textContent   = user.username;
      document.getElementById("sidebarEmail").textContent  = user.email;

      const lRes = await fetch(`${API}/protected/leaderboard`, { headers: { "Authorization": "Bearer " + token } });
      const { leaderboard } = await lRes.json();
      renderPodium(leaderboard, user.username);
      renderFullList(leaderboard, user.username);
    } catch (err) { console.error(err); }
  };

  function renderPodium(lb, currentUser) {
    const podium = document.getElementById("podium");
    podium.innerHTML = "";
    if (lb.length < 3) return;
    const order   = [lb[1], lb[0], lb[2]];
    const medals  = ["🥈", "🥇", "🥉"];
    const sizes   = [56, 72, 56];
    const heights = ["60px", "90px", "50px"];
    const colors  = ["rgba(66,245,200,0.1)", "rgba(255,215,0,0.1)", "rgba(200,245,66,0.1)"];
    const borders = ["rgba(66,245,200,0.2)", "rgba(255,215,0,0.2)", "rgba(200,245,66,0.2)"];
    order.forEach((u, i) => {
      if (!u) return;
      const wrap = document.createElement("div");
      wrap.className = "podium-wrap";
      wrap.innerHTML = `
        <div class="podium-avatar" style="width:${sizes[i]}px;height:${sizes[i]}px;font-size:${i===1?28:22}px">
          ${u.username[0].toUpperCase()}
        </div>
        <div class="podium-name">${u.username} ${u.username === currentUser ? '<span style="color:var(--accent);font-size:10px">YOU</span>' : ""}</div>
        <div class="podium-pts">${u.points.toLocaleString()} pts</div>
        <div class="podium-base" style="height:${heights[i]};background:${colors[i]};border:1px solid ${borders[i]}">${medals[i]}</div>
      `;
      podium.appendChild(wrap);
    });
  }

  function renderFullList(lb, currentUser) {
    const list = document.getElementById("lbFull");
    list.innerHTML = "";
    if (!lb.length) { list.innerHTML = '<div class="empty">No players yet 👀</div>'; return; }
    lb.forEach((u, i) => {
      const isYou = u.username === currentUser;
      const topClass = i === 0 ? "top1" : i === 1 ? "top2" : i === 2 ? "top3" : "";
      const row = document.createElement("div");
      row.className = `lb-row ${topClass} ${isYou ? "you" : ""}`;
      row.innerHTML = `
        <div class="rank-num">${i + 1}</div>
        <div class="lb-avatar">${u.username[0].toUpperCase()}</div>
        <div class="lb-name">
          <div class="lb-username">
            ${u.username}
            ${isYou ? '<span class="you-tag">YOU</span>' : ""}
          </div>
        </div>
        <div class="lb-pts-val">${u.points.toLocaleString()}</div>
      `;
      list.appendChild(row);
    });
  }

  function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "login.html";
  }
</script>
</body>
</html>
